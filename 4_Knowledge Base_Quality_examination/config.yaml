# 知识库质量检测工具配置文件

# LLM 检测模式: mock(模拟) / real(真实API)
llm_mode: mock

# DeepSeek API 配置（real 模式时使用）
deepseek:
  api_key: "sk-587f7e69f8b8449faee20ef0f458e307"
  model: deepseek-chat
  base_url: https://api.deepseek.com

# 数据文件路径（相对于项目根目录）
data:
  kb_file: 4_task_requirements/task6_kb_articles.json
  business_context_file: 4_task_requirements/task6_business_context.md

# 报告输出目录（相对于项目根目录）
output_dir: output

# 检测阈值
thresholds:
  incomplete_min_chars: 10         # 回答少于该字符数视为不完整
  duplicate_similarity: 0.8        # Jaccard 相似度阈值
